<div class="offcanvas offcanvas-start border-0 shadow-lg" tabindex="-1" id="offcanvasPerfil" style="width: 400px;">
  <div class="offcanvas-header bg-indigo text-white p-4" style="background-color: #312e81;">
    <h5 class="offcanvas-title fw-bold d-flex align-items-center">
      <i class="bi bi-person-circle me-2 fs-4"></i> Mi Perfil
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  
  <div class="offcanvas-body p-4">
    <p class="text-muted small mb-4">Actualiza tu información personal y de contacto.</p>

    <form (ngSubmit)="onUpdate()" #perfilForm="ngForm">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-bold small">Nombre(s)</label>
          <input type="text" class="form-control bg-light border-0 py-2" [(ngModel)]="usuario.nombre" name="nombre" required>
        </div>

        <div class="col-12">
          <label class="form-label fw-bold small">Apellidos</label>
          <input type="text" class="form-control bg-light border-0 py-2" [(ngModel)]="usuario.apellido" name="apellido" required>
        </div>

        <div class="col-12">
          <label class="form-label fw-bold small">Email (No editable)</label>
          <input type="email" class="form-control bg-light border-0 py-2" [value]="usuario.email" disabled>
        </div>

        <div class="col-12">
          <label class="form-label fw-bold small">Teléfono</label>
          <input type="text" class="form-control bg-light border-0 py-2" [(ngModel)]="usuario.telefono" name="telefono" required maxlength="9">
        </div>

        <div class="col-12">
          <label class="form-label fw-bold small">Fecha de Nacimiento</label>
          <input type="date" class="form-control bg-light border-0 py-2" [(ngModel)]="usuario.fechaNacimiento" name="fechaNacimiento" required>
        </div>

        <div class="col-12 mt-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="checkCon" [(ngModel)]="usuario.consentimiento" name="consentimiento">
            <label class="form-check-label small" for="checkCon">Autorizo tratamiento de datos</label>
          </div>
        </div>

        <div class="col-12 mt-4 pt-3 border-top">
          <label class="form-label fw-bold small text-primary">Cambiar Contraseña</label>
          <input type="password" class="form-control bg-light border-0 py-2 mb-2" [(ngModel)]="usuario.password" name="password" placeholder="Nueva contraseña">
          <input type="password" class="form-control bg-light border-0 py-2" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirmar nueva contraseña">
        </div>

        <div class="col-12 mt-5">
          <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow-sm fw-bold" 
                  [disabled]="!perfilForm.valid || isLoading()" style="background-color: #312e81;">
            <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2"></span>
            Guardar Cambios
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
