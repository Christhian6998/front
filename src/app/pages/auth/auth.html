<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card login-card shadow-lg border-0 rounded-4">
    
    <div class="text-center mb-5">
      <div class="icon-circle bg-primary text-white mx-auto">
        <i class="bi bi-person-badge-fill fs-2"></i>
      </div>
      <h2 class="fw-bolder m-0" style="color: #312e81;">¡Bienvenido!</h2>
      <p class="text-muted mt-2">Ingresa tus credenciales para continuar.</p>
    </div>

    <div *ngIf="errorMessage()" class="alert alert-danger border-0 small text-center mb-4 py-3">
      {{ errorMessage() }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="form-floating mb-3">
        <input type="email" class="form-control rounded-3 shadow-sm border-light" id="email" 
               placeholder="name@example.com" [(ngModel)]="email" name="email" required>
        <label for="email" class="text-muted">Correo electrónico</label>
      </div>

      <div class="form-floating mb-4">
        <input type="password" class="form-control rounded-3 shadow-sm border-light" id="password" 
               placeholder="Contraseña" [(ngModel)]="password" name="password" required>
        <label for="password" class="text-muted">Contraseña</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-sm mt-2" 
              [disabled]="isLoading()" style="font-size: 1.1rem;">
        <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2"></span>
        {{ isLoading() ? 'Iniciando sesión...' : 'Entrar ahora' }}
      </button>
    </form>

    <div class="text-center mt-5">
      <p class="small text-muted mb-0">¿Eres nuevo por aquí?</p>
      <a href="/registro" class="fw-bold text-primary text-decoration-none">Crea tu cuenta gratis</a>
    </div>
  </div>
</div>
