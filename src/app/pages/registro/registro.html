<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card register-card shadow-lg border-0 rounded-4 p-5">
    <div class="text-center mb-4">
      <h2 class="fw-bold" style="color: #312e81;">Crea tu cuenta</h2>
      <p class="text-muted">Únete a la orientación vocacional 🚀</p>
    </div>

    <form (ngSubmit)="onRegister()" #regForm="ngForm" novalidate>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Nombres *</label>
          <input type="text" name="nombre" [(ngModel)]="usuario.nombre" #nombre="ngModel"
                class="form-control" [class.is-invalid]="nombre.invalid && nombre.touched" required>
          <div class="invalid-feedback">El nombre es obligatorio.</div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Apellidos *</label>
          <input type="text" name="apellido" [(ngModel)]="usuario.apellido" #apellido="ngModel"
                class="form-control" [class.is-invalid]="apellido.invalid && apellido.touched" required>
          <div class="invalid-feedback">El apellido es obligatorio.</div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-8 mb-3">
          <label class="form-label small fw-bold">Email *</label>
          <input type="email" name="email" [(ngModel)]="usuario.email" #email="ngModel"
                class="form-control" [class.is-invalid]="email.invalid && email.touched" 
                required email placeholder="ejemplo@correo.com">
          <div class="invalid-feedback">Ingresa un email válido (valid email).</div>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label small fw-bold">Teléfono *</label>
          <input type="text" name="telefono" [(ngModel)]="usuario.telefono" #tel="ngModel"
                class="form-control" [class.is-invalid]="tel.invalid && tel.touched" 
                required pattern="9[0-9]{8}" maxlength="9">
          <div class="invalid-feedback">9 dígitos y debe empezar con 9.</div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Fecha de Nacimiento *</label>
          <input type="date" name="fechaNacimiento" [(ngModel)]="usuario.fechaNacimiento" #fecha="ngModel"
                class="form-control" [class.is-invalid]="fecha.invalid && fecha.touched" required>
          <div class="invalid-feedback">La fecha es obligatoria.</div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Dirección (Opcional)</label>
          <input type="text" name="direccion" [(ngModel)]="usuario.direccion" class="form-control">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Contraseña *</label>
          <input type="password" name="password" [(ngModel)]="usuario.password" #pass="ngModel"
                class="form-control" [class.is-invalid]="pass.invalid && pass.touched" required minlength="6">
          <div class="invalid-feedback">Mínimo 6 caracteres.</div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label small fw-bold">Confirmar Contraseña *</label>
          <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" #cPass="ngModel"
                class="form-control" [class.is-invalid]="confirmPassword !== usuario.password && cPass.touched" required>
          <div class="invalid-feedback">Las contraseñas no coinciden.</div>
        </div>
      </div>

      <div class="form-check mb-4 mt-2">
        <input class="form-check-input" type="checkbox" name="consentimiento" [(ngModel)]="usuario.consentimiento" id="check">
        <label class="form-check-label small text-muted" for="check">
          Acepto el tratamiento de datos.
        </label>
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold" 
              [disabled]="isLoading() || regForm.invalid">
        {{ isLoading() ? 'Registrando...' : 'Finalizar Registro' }}
      </button>
    </form>
  </div>
</div>
